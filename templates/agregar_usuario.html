{% extends 'base.html' %}

{% block contenido %}
<section class="donacion-form-page usuarios-form-page">
    <h1 class="donacion-page-title">Agregar usuario</h1>
    <p class="donacion-page-subtitle">Alta de usuario y permisos de acceso.</p>

    <div class="donacion-form-card">
        {% if error %}
        <p class="form-alert">{{ error }}</p>
        {% endif %}

        <form method="POST">
            <div class="form-field">
                <label for="usuario">Usuario</label>
                <input id="usuario" type="text" name="usuario" placeholder="Usuario" required>
            </div>

            <div class="form-field">
                <label for="email">Email</label>
                <input id="email" type="email" name="email" placeholder="Email" required>
            </div>

            <div class="form-field">
                <label for="password">Contraseña</label>
                <input id="password" type="password" name="password" placeholder="Contraseña" required>
                <small class="usuarios-form-help">12+ caracteres, mayúscula, minúscula, número y especial (!@#$%^&*-_=+).</small>
            </div>

            <div class="usuarios-checkbox-group">
                <label class="usuarios-checkbox-field">
                    <input type="checkbox" name="acceso_privado" checked>
                    Habilitar acceso a parte privada
                </label>
            </div>

            <div class="usuarios-checkbox-group">
                <label class="usuarios-checkbox-field">
                    <input type="checkbox" name="es_admin">
                    Dar rol administrador
                </label>
            </div>

            <button type="submit" class="btn btn-primary form-submit-btn">Guardar</button>
        </form>
    </div>

    <div class="dashboard-actions usuarios-form-actions">
        <a href="/autogestion/usuarios" class="btn btn-muted">Volver</a>
    </div>
</section>

{% endblock %}
